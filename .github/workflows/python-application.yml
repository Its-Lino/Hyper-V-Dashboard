name: Python application

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements*.txt

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi flake8 pytest requests

      - name: Check Python syntax
        run: |
          python -m compileall hyperv_dashboard scripts

      - name: Check non-Windows guard
        run: |
          python -m hyperv_dashboard --version
          ! python -m hyperv_dashboard

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics

      - name: Test with pytest
        shell: bash
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            echo "No tests directory found; skipping pytest."
          fi

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements*.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Generate application icon
        run: |
          python scripts/generate_icon.py --output assets/hyperv-dashboard.ico

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --paths . --add-data "templates;templates" --add-data "assets;assets" --hidden-import pystray --hidden-import PIL --name HyperVDashboard --uac-admin --noconsole --icon assets/hyperv-dashboard.ico scripts/pyinstaller_entry.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperVDashboard-windows
          path: dist/HyperVDashboard.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HyperVDashboard.exe
          generate_release_notes: true
